<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">coolThing Archive social preview</title>
  <desc id="desc">Retro web experiments and browser music tools by MCamner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07100e"/>
      <stop offset="0.48" stop-color="#050807"/>
      <stop offset="1" stop-color="#120d09"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="18%" cy="18%" r="60%">
