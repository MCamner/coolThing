<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptImage — coolThing</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --text: #e0e0e0;
            --accent: #ff00ff;
            --accent-dim: #770077;
            --font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            color: var(--accent);
            text-shadow: 2px 2px #00ffff;
            margin: 0;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel);
            border: 2px solid var(--accent);
            box-shadow: 10px 10px 0px var(--accent-dim);
            padding: 30px;
            box-sizing: border-box;
        }

        .upload-zone {
            border: 2px dashed #444;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        .upload-zone:hover {
            border-color: var(--accent);
        }

        #fileInput {
            display: none;
        }

        .preview {
            max-width: 100%;
            max-height: 400px;
            display: none;
            margin: 0 auto 20px auto;
            border: 1px solid #444;
        }

        .status {
            text-align: center;
            margin-bottom: 20px;
            height: 20px;
            color: var(--accent);
        }

        .results {
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .control {
            min-width: 0;
        }

        select {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #00ffff;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .toggle-row input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #00ffff;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            box-sizing: border-box;
        }

        .copy-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 15px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .copy-btn:hover {
            background: #fff;
        }

        .copy-btn:active {
            transform: translateY(1px);
        }

        .variation {
            min-height: 60px;
        }

        .back-link {
            margin-top: 40px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* Scanline effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2.2rem;
                letter-spacing: 0;
            }

            .container {
                padding: 20px;
            }

            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>PROMPT-IMAGE</h1>
        <div class="subtitle">AI Vision for Perchance.org — interpret any image</div>
    </header>

    <div class="container">
        <div class="controls">
            <div class="control">
                <label for="styleSelect">STYLE</label>
                <select id="styleSelect">
                    <option value="open">Open / No Preset</option>
                    <option value="perchance">Perchance Fantasy</option>
                    <option value="photoreal">Photorealistic</option>
                    <option value="photo90s">1990s Photo</option>
                    <option value="photo80s">1980s Photo</option>
                    <option value="pulp">Vintage Pulp Art</option>
                    <option value="cinematic">Cinematic</option>
                    <option value="anime">Anime</option>
                    <option value="oil">Oil Painting</option>
                    <option value="pixel">Pixel Art</option>
                    <option value="album">Album Cover</option>
                    <option value="logo">Logo / Icon</option>
                </select>
            </div>

            <div class="control">
                <label for="detailSelect">DETAIL</label>
                <select id="detailSelect">
                    <option value="free">Free</option>
                    <option value="balanced">Balanced</option>
                    <option value="short">Short</option>
                    <option value="ultra">Ultra Detailed</option>
                </select>
            </div>
        </div>

        <label class="toggle-row">
            <input type="checkbox" id="variationToggle">
            MAKE 5 VARIATIONS
        </label>

        <div class="upload-zone" id="dropZone">
            <p>DRAG & DROP IMAGE OR CLICK TO BROWSE</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <img id="previewImage" class="preview">

        <div class="status" id="status">READY</div>

        <div class="results" id="results">
            <div class="field">
                <label>PROMPT</label>
                <textarea id="promptText" readonly></textarea>
                <button class="copy-btn" onclick="copy('promptText')">COPY PROMPT</button>
            </div>

            <div class="field">
                <label>NEGATIVE PROMPT</label>
                <textarea id="negPromptText" readonly></textarea>
                <button class="copy-btn" onclick="copy('negPromptText')">COPY NEGATIVE</button>
            </div>

            <div class="field" id="variationsField" style="display: none;">
                <label>VARIATIONS</label>
                <textarea id="variation1" class="variation" readonly></textarea>
                <button class="copy-btn" onclick="copy('variation1')">COPY V1</button>
                <textarea id="variation2" class="variation" readonly></textarea>
                <button class="copy-btn" onclick="copy('variation2')">COPY V2</button>
                <textarea id="variation3" class="variation" readonly></textarea>
                <button class="copy-btn" onclick="copy('variation3')">COPY V3</button>
                <textarea id="variation4" class="variation" readonly></textarea>
                <button class="copy-btn" onclick="copy('variation4')">COPY V4</button>
                <textarea id="variation5" class="variation" readonly></textarea>
                <button class="copy-btn" onclick="copy('variation5')">COPY V5</button>
            </div>
        </div>
    </div>

    <a href="../index.html" class="back-link">&lt; BACK TO COOLTHING</a>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        const promptText = document.getElementById('promptText');
        const negPromptText = document.getElementById('negPromptText');
        const styleSelect = document.getElementById('styleSelect');
        const detailSelect = document.getElementById('detailSelect');
        const variationToggle = document.getElementById('variationToggle');
        const variationsField = document.getElementById('variationsField');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--accent)';
        };

        dropZone.ondragleave = () => {
            dropZone.style.borderColor = '#444';
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        const API_BASE = window.location.hostname === '127.0.0.1'
            ? 'http://127.0.0.1:8001'
            : 'http://localhost:8001';

        async function handleFile(file) {
            if (!file) return;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
            };
            reader.readAsDataURL(file);

            status.textContent = 'INTERPRETING...';
            results.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('style', styleSelect.value);
            formData.append('detail', detailSelect.value);
            formData.append('variations', variationToggle.checked ? 'true' : 'false');

            try {
                const response = await fetch(`${API_BASE}/prompt-image`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    let message = 'Failed to interpret image';
                    try {
                        const errorData = await response.json();
                        message = errorData.detail || message;
                    } catch (_) {
                        message = response.statusText || message;
                    }
                    throw new Error(message);
                }

                const data = await response.json();
                
                promptText.value = data.prompt;
                negPromptText.value = data.negative_prompt;
                renderVariations(data.variations || []);
                
                status.textContent = 'COMPLETE';
                results.style.display = 'block';
            } catch (err) {
                console.error(err);
                status.textContent = 'ERROR: ' + err.message;
            }
        }

        function renderVariations(variations) {
            variationsField.style.display = variations.length ? 'block' : 'none';

            for (let i = 1; i <= 5; i++) {
                const field = document.getElementById(`variation${i}`);
                field.value = variations[i - 1] || '';
                field.style.display = variations[i - 1] ? 'block' : 'none';
                field.nextElementSibling.style.display = variations[i - 1] ? 'inline-block' : 'none';
            }
        }

        function copy(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            const btn = el.nextElementSibling;
            const originalText = btn.textContent;
            btn.textContent = 'COPIED!';
            setTimeout(() => btn.textContent = originalText, 2000);
        }
    </script>
</body>
</html>
