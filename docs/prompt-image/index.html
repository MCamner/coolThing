<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptImage — coolThing</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --text: #e0e0e0;
            --accent: #ff00ff;
            --accent-dim: #770077;
            --font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            color: var(--accent);
            text-shadow: 2px 2px #00ffff;
            margin: 0;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel);
            border: 2px solid var(--accent);
            box-shadow: 10px 10px 0px var(--accent-dim);
            padding: 30px;
            box-sizing: border-box;
        }

        .upload-zone {
            border: 2px dashed #444;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        .upload-zone:hover {
            border-color: var(--accent);
        }

        #fileInput {
            display: none;
        }

        .preview {
            max-width: 100%;
            max-height: 400px;
            display: none;
            margin: 0 auto 20px auto;
            border: 1px solid #444;
        }

        .status {
            text-align: center;
            margin-bottom: 20px;
            height: 20px;
            color: var(--accent);
        }

        .results {
            display: none;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #00ffff;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            box-sizing: border-box;
        }

        .copy-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 15px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .copy-btn:hover {
            background: #fff;
        }

        .copy-btn:active {
            transform: translateY(1px);
        }

        .back-link {
            margin-top: 40px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* Scanline effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>PROMPT-IMAGE</h1>
        <div class="subtitle">AI Vision for Perchance.org — interpret any image</div>
    </header>

    <div class="container">
        <div class="upload-zone" id="dropZone">
            <p>DRAG & DROP IMAGE OR CLICK TO BROWSE</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <img id="previewImage" class="preview">

        <div class="status" id="status">READY</div>

        <div class="results" id="results">
            <div class="field">
                <label>PROMPT</label>
                <textarea id="promptText" readonly></textarea>
                <button class="copy-btn" onclick="copy('promptText')">COPY PROMPT</button>
            </div>

            <div class="field">
                <label>NEGATIVE PROMPT</label>
                <textarea id="negPromptText" readonly></textarea>
                <button class="copy-btn" onclick="copy('negPromptText')">COPY NEGATIVE</button>
            </div>
        </div>
    </div>

    <a href="../index.html" class="back-link">&lt; BACK TO COOLTHING</a>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        const promptText = document.getElementById('promptText');
        const negPromptText = document.getElementById('negPromptText');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--accent)';
        };

        dropZone.ondragleave = () => {
            dropZone.style.borderColor = '#444';
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        async function handleFile(file) {
            if (!file) return;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.style.display = 'block';
            };
            reader.readAsDataURL(file);

            status.textContent = 'INTERPRETING...';
            results.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('http://localhost:8001/prompt-image', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Failed to interpret image');

                const data = await response.json();
                
                promptText.value = data.prompt;
                negPromptText.value = data.negative_prompt;
                
                status.textContent = 'COMPLETE';
                results.style.display = 'block';
            } catch (err) {
                console.error(err);
                status.textContent = 'ERROR: ' + err.message;
            }
        }

        function copy(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            const btn = el.nextElementSibling;
            const originalText = btn.textContent;
            btn.textContent = 'COPIED!';
            setTimeout(() => btn.textContent = originalText, 2000);
        }
    </script>
</body>
</html>
