<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>coolThing</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b0f14, #05080c);
      color: #e8eef5;
      display: grid;
      place-items: center;
    }

    main {
      width: min(900px, 92vw);
      padding: 48px;
      border: 1px solid #263241;
      border-radius: 24px;
      background: #111824;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: clamp(42px, 8vw, 84px);
      margin: 0 0 12px;
      letter-spacing: 2px;
    }

    .tagline {
      color: #aab7c4;
      font-size: 18px;
      margin: 0 0 32px;
    }

    .projects {
      display: grid;
      gap: 16px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      color: #e8eef5;
      text-decoration: none;
      border: 1px solid #2f3d4d;
      border-radius: 14px;
      padding: 20px 22px;
      background: #151f2d;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #7dd3fc;
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 32px;
      flex-shrink: 0;
    }

    .card-text h2 {
      margin: 0 0 4px;
      font-size: 17px;
    }

    .card-text p {
      margin: 0;
      font-size: 14px;
      color: #7a9ab5;
    }

    footer {
      margin-top: 36px;
      font-size: 13px;
      color: #4a5a6a;
    }
  </style>
</head>

<body>
  <main>
    <h1>coolThing</h1>
    <p class="tagline">Retro web experiments.</p>

    <div class="projects">
      <a class="card" href="megamovietube.html">
        <span class="card-icon">📺</span>
        <div class="card-text">
          <h2>Mega Movie Tube</h2>
          <p>Retro 90s MTV-inspired streaming launcher.</p>
        </div>
      </a>

      <a class="card" href="mega-guitar/">
        <span class="card-icon">🎸</span>
        <div class="card-text">
          <h2>Mega Guitar Tabs</h2>
          <p>Generate guitar tabs from a YouTube link.</p>
        </div>
      </a>
    </div>

    <footer>Built by Mattias Camner · GitHub Pages</footer>
  </main>
</body>
</html>
