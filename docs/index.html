<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>coolThing</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b0f14, #05080c);
      color: #e8eef5;
      display: grid;
      place-items: center;
    }

    main {
      width: min(900px, 92vw);
      padding: 48px;
      border: 1px solid #263241;
      border-radius: 24px;
      background: #111824;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: clamp(42px, 8vw, 84px);
      margin: 0 0 12px;
      letter-spacing: 2px;
    }

    p {
      color: #aab7c4;
      font-size: 18px;
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 32px;
    }

    a {
      color: #e8eef5;
      text-decoration: none;
      border: 1px solid #2f3d4d;
      border-radius: 14px;
      padding: 16px 18px;
      background: #151f2d;
      transition: all 0.2s ease;
    }

    a:hover {
      border-color: #7dd3fc;
      transform: translateY(-2px);
    }

    small {
      display: block;
      margin-top: 32px;
      color: #6f7d8c;
    }
  </style>
</head>

<body>
  <main>
    <h1>coolThing</h1>

    <p>
      Tools, scripts and retro web experiments.
    </p>

    <div class="links">
      <a href="megamovietube.html">📺 Mega Movie Tube</a>
      <a href="mega-guitar/">🎸 Mega Guitar Tabs</a>
      <a href="../tools/connect-any-repo.sh">⚙️ connect-any-repo.sh</a>
    </div>

    <small>Built by Mattias Camner · GitHub Pages</small>
  </main>
</body>
</html>
