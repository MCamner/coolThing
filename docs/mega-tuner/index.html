<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mega Tuner</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">

  <style>
    :root {
      --bg:    #0b0b09;
      --text:  #f0ede0;
      --muted: #6a6050;
      --line:  rgba(255, 200, 80, 0.14);
      --green: #4dff91;
      --amber: #ffb830;
      --red:   #ff4040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 50% 20%, rgba(77,255,145,0.045) 0%, transparent 55%),
        linear-gradient(180deg, #0f0f0b 0%, #070706 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.016) 0px,
        rgba(255,255,255,0.016) 1px,
        transparent 1px,
        transparent 4px
      );
    }

    .shell {
      position: relative;
      z-index: 2;
      width: min(520px, 94vw);
      padding: 28px 0 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── topbar ── */
    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    .topbar-title {
      font-size: 12px;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .signal-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .signal-dot.on {
      background: var(--green);
      animation: sig-pulse 1.4s ease infinite;
    }
    @keyframes sig-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(77,255,145,0.5); }
      50%       { box-shadow: 0 0 0 5px rgba(77,255,145,0); }
    }

    /* ── note display ── */
    .note-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      min-height: 116px;
      justify-content: center;
    }

    .note-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .note-name {
      font-size: clamp(80px, 20vw, 112px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      transition: color 0.15s;
    }
    .note-name.idle   { color: rgba(240,237,224,0.18); }
    .note-name.in-tune { color: var(--green); }
    .note-name.close   { color: var(--amber); }
    .note-name.out     { color: var(--red); }

    .note-octave {
      font-size: 22px;
      color: var(--muted);
      padding-top: 14px;
      min-width: 18px;
    }

    .note-freq {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
    }

    /* ── meter ── */
    .meter-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    #meter { display: block; max-width: 100%; }

    /* ── cents ── */
    .cents-val {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      min-height: 28px;
      margin-bottom: 28px;
      transition: color 0.15s;
    }
    .cents-val.in-tune { color: var(--green); }
    .cents-val.close   { color: var(--amber); }
    .cents-val.out     { color: var(--red); }

    /* ── closest string ── */
    .closest {
      font-size: 12px;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      min-height: 16px;
      margin-bottom: 24px;
    }

    /* ── string reference ── */
    .string-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }

    .str-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 13px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      letter-spacing: 0.08em;
      cursor: default;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }
    .str-btn.active {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(255,184,48,0.1);
    }

    /* ── start/stop ── */
    .start-btn {
      border: 1px solid rgba(77,255,145,0.35);
      border-radius: 10px;
      padding: 16px 44px;
      background: rgba(77,255,145,0.08);
      color: var(--green);
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .start-btn:hover { background: rgba(77,255,145,0.16); border-color: var(--green); }
    .start-btn.running {
      border-color: rgba(255,64,64,0.4);
      background: rgba(255,64,64,0.08);
      color: var(--red);
    }
    .start-btn.running:hover { background: rgba(255,64,64,0.18); border-color: var(--red); }

    .err { display: none; margin-top: 14px; font-size: 13px; color: var(--red); text-align: center; letter-spacing: 0.05em; }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="../">← back</a>
      <span class="topbar-title">Mega Tuner</span>
      <div class="signal-dot" id="dot"></div>
    </header>

    <div class="note-display">
      <div class="note-row">
        <div class="note-name idle" id="note-name">—</div>
        <div class="note-octave" id="note-oct"></div>
      </div>
      <div class="note-freq" id="note-freq">— Hz</div>
    </div>

    <div class="meter-wrap">
      <canvas id="meter"></canvas>
    </div>

    <div class="cents-val" id="cents">— ¢</div>
    <div class="closest"   id="closest"></div>

    <div class="string-row" id="string-row"></div>

    <button class="start-btn" id="start-btn">Start tuner</button>
    <div class="err" id="err"></div>
  </div>

  <script>
    const STRINGS = [
      { label: 'E2', midi: 40 },
      { label: 'A2', midi: 45 },
      { label: 'D3', midi: 50 },
      { label: 'G3', midi: 55 },
      { label: 'B3', midi: 59 },
      { label: 'E4', midi: 64 },
    ];
    const ORDINALS = ['6th','5th','4th','3rd','2nd','1st'];
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

    const noteNameEl = document.getElementById('note-name');
    const noteOctEl  = document.getElementById('note-oct');
    const noteFreqEl = document.getElementById('note-freq');
    const centsEl    = document.getElementById('cents');
    const closestEl  = document.getElementById('closest');
    const startBtn   = document.getElementById('start-btn');
    const dot        = document.getElementById('dot');
    const errEl      = document.getElementById('err');
    const canvas     = document.getElementById('meter');
    const ctx2d      = canvas.getContext('2d');

    // String buttons
    const stringRow = document.getElementById('string-row');
    STRINGS.forEach((s, i) => {
      const b = document.createElement('button');
      b.className = 'str-btn';
      b.textContent = s.label;
      b.dataset.i = i;
      stringRow.appendChild(b);
    });
    const strBtns = Array.from(stringRow.querySelectorAll('.str-btn'));

    // DPI-aware canvas
    const dpr = window.devicePixelRatio || 1;
    const CW = 340, CH = 188;
    canvas.width  = CW * dpr;
    canvas.height = CH * dpr;
    canvas.style.width  = CW + 'px';
    canvas.style.height = CH + 'px';
    ctx2d.scale(dpr, dpr);

    // Meter geometry
    const CX = CW / 2;
    const CY = CH - 18;
    const R  = 150;
    const NL = R - 14; // needle length

    function c2a(cents) {
      // -50¢ → pointing left, 0¢ → up, +50¢ → right
      return -Math.PI / 2 + (cents * Math.PI / 100);
    }

    function drawMeter(smoothCents, signal) {
      ctx2d.clearRect(0, 0, CW, CH);

      const alpha = signal ? 1 : 0.22;
      const abs = Math.abs(smoothCents);
      const needleColor = !signal ? '#3a3530'
        : abs <= 5  ? '#4dff91'
        : abs <= 20 ? '#ffb830'
        : '#ff4040';

      // Arc zones
      const zones = [
        [-50, -20, '#ff4040'],
        [-20,  -5, '#ffb830'],
        [ -5,  +5, '#4dff91'],
        [ +5, +20, '#ffb830'],
        [+20, +50, '#ff4040'],
      ];
      ctx2d.lineWidth = 18;
      ctx2d.lineCap = 'butt';
      for (const [from, to, color] of zones) {
        ctx2d.globalAlpha = alpha * 0.26;
        ctx2d.beginPath();
        ctx2d.arc(CX, CY, R, c2a(from), c2a(to));
        ctx2d.strokeStyle = color;
        ctx2d.stroke();
      }

      // Tick marks
      for (const tick of [-50, -25, 0, 25, 50]) {
        const a = c2a(tick);
        const isC = tick === 0;
        ctx2d.globalAlpha = alpha * (isC ? 0.9 : 0.55);
        ctx2d.beginPath();
        ctx2d.moveTo(CX + (R - (isC ? 24 : 15)) * Math.cos(a), CY + (R - (isC ? 24 : 15)) * Math.sin(a));
        ctx2d.lineTo(CX + (R + 5) * Math.cos(a), CY + (R + 5) * Math.sin(a));
        ctx2d.strokeStyle = isC ? '#fff' : '#4a4035';
        ctx2d.lineWidth = isC ? 2 : 1;
        ctx2d.stroke();
      }

      // Needle glow
      if (signal) {
        const a = c2a(smoothCents);
        ctx2d.globalAlpha = 0.2;
        ctx2d.beginPath();
        ctx2d.moveTo(CX, CY);
        ctx2d.lineTo(CX + NL * Math.cos(a), CY + NL * Math.sin(a));
        ctx2d.strokeStyle = needleColor;
        ctx2d.lineWidth = 8;
        ctx2d.lineCap = 'round';
        ctx2d.stroke();
      }

      // Needle
      const na = c2a(smoothCents);
      ctx2d.globalAlpha = signal ? 1 : 0.22;
      ctx2d.beginPath();
      ctx2d.moveTo(CX, CY);
      ctx2d.lineTo(CX + NL * Math.cos(na), CY + NL * Math.sin(na));
      ctx2d.strokeStyle = needleColor;
      ctx2d.lineWidth = 2;
      ctx2d.lineCap = 'round';
      ctx2d.stroke();

      // Pivot dot
      ctx2d.globalAlpha = 1;
      ctx2d.beginPath();
      ctx2d.arc(CX, CY, 5, 0, Math.PI * 2);
      ctx2d.fillStyle = signal ? needleColor : '#2a2520';
      ctx2d.fill();

      ctx2d.globalAlpha = 1;
    }

    // ── Pitch detection (YIN algorithm) ──
    // YIN finds minima of the difference function — avoids the harmonic
    // confusion that causes simple autocorrelation to misread low strings.
    function detectPitch(buf, sr) {
      const n = buf.length;
      const W = Math.floor(n / 2); // YIN window

      // Silence gate — low strings can be quiet, so threshold is low
      let rms = 0;
      for (let i = 0; i < n; i++) rms += buf[i] * buf[i];
      if (Math.sqrt(rms / n) < 0.004) return null;

      const minTau = Math.floor(sr / 1200); // ~37 @ 44100 Hz
      const maxTau = Math.min(Math.ceil(sr / 55), W - 1); // ~55 Hz floor covers E2

      // Compute cumulative mean normalised difference function (CMNDF)
      const cmndf = new Float32Array(maxTau + 2);
      cmndf[0] = 1;
      let runSum = 0;

      for (let tau = 1; tau <= maxTau; tau++) {
        let d = 0;
        for (let i = 0; i < W; i++) {
          const delta = buf[i] - buf[i + tau];
          d += delta * delta;
        }
        runSum += d;
        cmndf[tau] = runSum > 0 ? (d * tau) / runSum : 1;
      }

      // Find the first dip below threshold — this is the fundamental period,
      // not a harmonic (harmonics would appear at shorter tau values but the
      // CMNDF stays high there for a complex guitar waveform)
      const THRESH = 0.15;
      let bestTau = -1;

      for (let tau = minTau; tau < maxTau; tau++) {
        if (cmndf[tau] < THRESH) {
          // Walk to local minimum
          while (tau + 1 < maxTau && cmndf[tau + 1] < cmndf[tau]) tau++;
          bestTau = tau;
          break;
        }
      }

      // Fallback: global minimum (less confident)
      if (bestTau < 0) {
        let minVal = Infinity;
        for (let tau = minTau; tau <= maxTau; tau++) {
          if (cmndf[tau] < minVal) { minVal = cmndf[tau]; bestTau = tau; }
        }
        if (minVal > 0.35) return null;
      }

      // Parabolic interpolation for sub-sample precision
      const v0 = bestTau > minTau ? cmndf[bestTau - 1] : cmndf[bestTau];
      const v1 = cmndf[bestTau];
      const v2 = bestTau < maxTau ? cmndf[bestTau + 1] : cmndf[bestTau];
      const denom = 2 * (v0 - 2 * v1 + v2);
      const shift = denom !== 0 ? (v0 - v2) / denom : 0;

      return sr / (bestTau + shift);
    }

    // ── Note info ──
    function freqToInfo(freq) {
      const mf    = 69 + 12 * Math.log2(freq / 440);
      const midi  = Math.round(mf);
      const cents = Math.round((mf - midi) * 100);
      return {
        name:   NOTE_NAMES[((midi % 12) + 12) % 12],
        octave: Math.floor(midi / 12) - 1,
        midi,
        cents:  Math.max(-50, Math.min(50, cents)),
      };
    }

    function closestString(midi) {
      return STRINGS.reduce((b, s) =>
        Math.abs(s.midi - midi) < Math.abs(b.midi - midi) ? s : b
      );
    }

    // ── State ──
    let audioCtx = null, analyser = null, source = null, rafId = null;
    let running = false;
    let hasSignal = false;
    let targetCents = 0, displayCents = 0;

    // ── Render loop ──
    let frame = 0;
    function loop() {
      rafId = requestAnimationFrame(loop);
      frame++;

      if (frame % 2 === 0 && analyser) {
        const buf = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buf);
        const freq = detectPitch(buf, audioCtx.sampleRate);

        if (freq) {
          hasSignal = true;
          const info = freqToInfo(freq);
          targetCents = info.cents;

          const abs  = Math.abs(info.cents);
          const cls  = abs <= 5 ? 'in-tune' : abs <= 20 ? 'close' : 'out';

          noteNameEl.textContent = info.name;
          noteNameEl.className   = 'note-name ' + cls;
          noteOctEl.textContent  = info.octave;
          noteFreqEl.textContent = freq.toFixed(1) + ' Hz';
          centsEl.textContent    = (info.cents >= 0 ? '+' : '') + info.cents + ' ¢';
          centsEl.className      = 'cents-val ' + cls;

          const cs  = closestString(info.midi);
          const idx = STRINGS.indexOf(cs);
          closestEl.textContent = `Closest · ${ORDINALS[idx]} string · ${cs.label}`;
          strBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
        } else {
          hasSignal = false;
        }
      }

      // Smooth needle lerp
      const target = hasSignal ? targetCents : 0;
      displayCents += (target - displayCents) * (hasSignal ? 0.2 : 0.07);
      drawMeter(displayCents, hasSignal);
    }

    // ── Start ──
    async function start() {
      errEl.style.display = 'none';
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 8192;
        analyser.smoothingTimeConstant = 0;
        source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);

        running = true;
        startBtn.textContent = 'Stop tuner';
        startBtn.classList.add('running');
        dot.classList.add('on');
        loop();
      } catch {
        errEl.style.display = 'block';
        errEl.textContent = 'Microphone access denied — allow mic in browser settings.';
      }
    }

    // ── Stop ──
    function stop() {
      running = false;
      hasSignal = false;
      cancelAnimationFrame(rafId); rafId = null;
      if (source) { source.disconnect(); source = null; }
      analyser = null;

      startBtn.textContent = 'Start tuner';
      startBtn.classList.remove('running');
      dot.classList.remove('on');

      noteNameEl.textContent = '—'; noteNameEl.className = 'note-name idle';
      noteOctEl.textContent  = '';
      noteFreqEl.textContent = '— Hz';
      centsEl.textContent    = '— ¢'; centsEl.className = 'cents-val';
      closestEl.textContent  = '';
      strBtns.forEach(b => b.classList.remove('active'));
      drawMeter(0, false);
    }

    startBtn.addEventListener('click', () => running ? stop() : start());

    // Initial draw
    drawMeter(0, false);
  </script>
</body>
</html>
